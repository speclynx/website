# Site settings
title: SpecLynx
email: info@speclynx.com
tagline: Enterprise-ready API tooling
description: >-
  SpecLynx is enterprise-ready API tooling for parsing, validating, transforming, and working
  with OpenAPI, AsyncAPI, Arazzo, Overlay, and JSON Schema.
keywords: SpecLynx, ApiDOM, OpenAPI, AsyncAPI, Arazzo, Overlay, JSON Schema, Language Service, API tooling, API specifications
baseurl: ""
url: "https://speclynx.com"
github_username: speclynx

# Social
twitter:
  username: "@speclynx"
  card: summary

# Build settings
markdown: kramdown
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Exclude from processing
exclude:
  - CLAUDE.md
  - README.md
  - LICENSE
  - NOTICE
  - .gitignore
  - .idea
  - Gemfile
  - Gemfile.lock
  - vendor
  - archive
